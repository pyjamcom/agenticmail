name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      stalwart:
        # Pinned to v0.15.5 — Stalwart 0.16+ moved its config to JSON
        # at /etc/stalwart/config.json, runs as UID 2000, and ignores
        # the legacy TOML mount, so the container enters bootstrap
        # mode and CI can't reach the admin API. See issue #10.
        image: stalwartlabs/stalwart:v0.15.5
        ports:
          - 8080:8080
          - 587:587
          - 143:143
          - 25:25
        env:
          STALWART_ADMIN_USER: admin
          STALWART_ADMIN_PASSWORD: testpassword
        options: >-
          --health-cmd "stalwart-cli -u http://localhost:8080 -c admin:testpassword server list-domains 2>/dev/null || true"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # 0.7.x of @agenticmail/core uses Node's built-in `node:sqlite`
          # (stable since Node 22), so CI must run on >=22. Older versions
          # of this workflow pinned 20 — the pin moved up with the DB
          # migration that dropped better-sqlite3.
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build

      - name: Run tests
        run: npm test
        env:
          STALWART_ADMIN_USER: admin
          STALWART_ADMIN_PASSWORD: testpassword
          STALWART_URL: http://localhost:8080
          AGENTICMAIL_MASTER_KEY: mk_test_key
          SMTP_HOST: localhost
          SMTP_PORT: 587
          IMAP_HOST: localhost
          IMAP_PORT: 143

      # Upload the built dist/ trees of every workspace as a single
      # workflow artifact. Useful for inspecting what a specific
      # commit produced without npm-installing the published version
      # (e.g. when reviewing a release PR's exact bytes, or
      # downloading a pre-publish build to test against locally).
      # Only runs on push to main so PR runs stay quick + don't
      # leave a trail of artifacts.
      - name: Upload build artifacts
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: agenticmail-dist-${{ github.sha }}
          path: |
            agenticmail/dist/**
            packages/api/dist/**
            packages/core/dist/**
            packages/mcp/dist/**
            packages/openclaw/dist/**
          if-no-files-found: error
          retention-days: 30
